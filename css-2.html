<!DOCTYPE html>
<html>
    <head>
        <!--
        1、color屬性定義文本顏色
        2、font-family屬性定義要使用的字體
        3、font-size屬性定義使用文本大小
        -->
        <style>
            h1 {text-align:center;color:blue;font-family: Verdana;font-size:300%;}
            p  {text-align:center;color:red;font-family: courier;font-size:160%}
        </style>
    </head>
<body>
    <h1>This is a heading.</h1>
    <p>This is a paragraph.</p>

</body>
</html>
