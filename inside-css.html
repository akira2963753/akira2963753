<!DOCTYPE html>
<html>
    <head>
        <!--將css定義在head裡面，利用style達成 語法如下-->
        <!--利用這種方法可以達成多樣性，而非指定單一性-->
        <style>
            body {background-color: powderblue;}
            h1   {border:2px solid firebrick;}
            h1   {color:blueviolet;}
            p    {color:red;}
        </style>
    </head>
    <body>
        <h1>This is a heading</h1>
    </body>
</html>
