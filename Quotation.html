<!DOCTYPE html>
<html>
    <head>
        <title>My web practice</title>
    </head>
<body>
    <!--利用blockquote可以引用資料進入網頁-->
    <blockquote cite="http://www.worldwildlife.org/who/index.html">
        This is text blockquote.
    </blockquote><br>

    <!--利用<q>可以加上""-->
    <q>This is text q.</q><br>

    <!--利用abbr可以加入標籤減少文字-->
    <q>The <abbr title="This is text abbr.">thing</abbr>was my work.</q><br>

    <address>This is address test</address><br>
    <cite>This is cite test</cite><br>
    <bdo dir="ctl">This is bdo test</bdo>





</body>
